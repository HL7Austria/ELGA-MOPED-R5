 794.5,143.2959 L802,143.2959 L792,133.2959 " fill="#C5F7BA" style="stroke:#8B95A5;stroke-width:1.0;"/><text fill="#111827" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="56" x="464" y="151.4277">Zustand:</text><text fill="#111827" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="250" x="464" y="167.5264">- Aufenthalts-/Besuchsdaten vollst&#228;ndig</text><text fill="#111827" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="279" x="480" y="183.625">(inklusive Entlassung bei station&#228;ren F&#228;llen)</text><text fill="#111827" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="177" x="464" y="199.7236">- Hauptdiagnose vorhanden</text><text fill="#111827" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="195" x="464" y="215.8223">G&#252;ltige Abrechnungszust&#228;nde:</text><text fill="#111827" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="323" x="464" y="231.9209">- keine vorl&#228;ufige/finale Abrechnung unbeantwortet</text><text fill="#111827" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="229" x="464" y="248.0195">- keine finale Abrechnung abgelehnt</text><text fill="#111827" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="233" x="464" y="264.1182">- keine finale Abrechnung genehmigt</text><text fill="#111827" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="4" x="464" y="280.2168">&#160;</text><line style="stroke:#111827;stroke-width:2.0;" x1="629.5" x2="619.5" y1="317.1323" y2="313.1323"/><line style="stroke:#111827;stroke-width:2.0;" x1="629.5" x2="619.5" y1="317.1323" y2="321.1323"/><line style="stroke:#111827;stroke-width:2.0;" x1="206.5" x2="630.5" y1="317.1323" y2="317.1323"/><text fill="#000000" font-family="Arial" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="7" x="213.5" y="312.3774">1</text><text fill="#000000" font-family="Arial" font-