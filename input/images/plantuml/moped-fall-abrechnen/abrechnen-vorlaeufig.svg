8" y="459.3115">durch den neuen LKFRequest wird der</text><text fill="#111827" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="271" x="488" y="475.4102">vorherige LKFRequest (falls einer existiert)</text><text fill="#111827" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="157" x="488" y="491.5088">automatisch gecancelled</text><path d="M496,517.4756 L496,565.4756 A5,5 0 0 0 501,570.4756 L759,570.4756 A5,5 0 0 0 764,565.4756 L764,522.4756 L754,512.4756 L501,512.4756 A5,5 0 0 0 496,517.4756 " fill="#C5F7BA" filter="url(#fqh6gzc2hy29b)" style="stroke:#8B95A5;stroke-width:1.0;"/><path d="M754,512.4756 L754,519.9756 A2.5,2.5 0 0 0 756.5,522.4756 L764,522.4756 L754,512.4756 " fill="#C5F7BA" style="stroke:#8B95A5;stroke-width:1.0;"/><text fill="#111827" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="56" x="502" y="530.6074">Zustand:</text><text fill="#111827" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="247" x="502" y="546.7061">- vorl&#228;ufige Abrechnung unbeantwortet</text><text fill="#111827" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="4" x="502" y="562.8047">&#160;</text><!--SRC=[ZLJDRXen4BxxAQnD3t2W2Kb9GWwHI9i4bQP5INgfUl6kPtSjZ4tz0pHLZts77df4VOhUU9CyIMUN0Dv0qXe9xSvy7d_pVJks0w56pB0XZRNXO5vhgGtTsIiNiUiiImQPqLxn1qJQAdu1mkQCwubG6KsPj11a7hOP1OOsmw8SKkQbkz3AlMT3e57722QZxOWRSGUq-Mfxiaexm2ZjW7uZb9uzRW3se9NkDNPuaxVXi4240Xp7xHPhhQAtkKW62gobJOnT1mqTutkVSLuqNbG9s3IRpUFz8upThAHnnWFv7XBiVXs1aK8DWXREpxS1FYfUFi23mA7syCM3IXQTzfbn8X4ZfbobfLQv7W4sR2rN5RGfy4PwQKubiPHblzZGCKPF7WjJ1jVQxYz3sqvS9HPd7M3e4fcFAZskAYzI6zqTfA_Im-hEqDgACsTw6dHGYM_JbSHwIgFFYcvRlIwjTS7SDTw2zRHdc1g0ofctzQtmg9WlQBNRI9Kb3a_10ipIwEaw4G75SOYdpnEfhYiz0luVEEIJjDAZc26VqTfWUjKlMPLb0WAuc7TQ-M4CXf1o1lKOXmNnoqAVl7LCyHFIe1sVWd8vayusTi-miIItd3bGTAobj6u-Krnaf21ImpcGteenq7Fb9BFMepqn28hLdD1gFZEuxs8-an9K7OjtcHyvBbYcj0KiQ78y5HIvdF-HJcH0Ex6195TOnzxvnM5Gi1f0CMguGSvdFaNaRYeKa-46wbKCgCD46mTkjMSJn-8C9EJgEKm62lAXo1mfXIn48m